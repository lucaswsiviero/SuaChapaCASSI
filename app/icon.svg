<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo arredondado gradiente -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Urna eleitoral simplificada -->
  <!-- Tampa da urna -->
  <rect x="6" y="8" width="20" height="4" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Slot de voto na tampa -->
  <rect x="14" y="9.5" width="4" height="1.5" rx="0.75" fill="url(#grad)"/>
  <!-- Corpo da urna -->
  <rect x="7" y="13" width="18" height="12" rx="2" fill="white" opacity="0.9"/>
  <!-- Estrela/check dentro da urna -->
  <path d="M16 16 L17.2 18.6 L20 18.9 L18 20.8 L18.5 23.6 L16 22.2 L13.5 23.6 L14 20.8 L12 18.9 L14.8 18.6 Z" fill="url(#grad)" opacity="0.85"/>
  <defs>
